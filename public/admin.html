<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Device Info Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <h1 class="header__title">Panel de Administracion</h1>
      <p class="header__subtitle">Consulta de visitas registradas</p>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="main">
    <div class="container">

      <!-- Pantalla de login -->
      <div id="loginScreen" class="card login-card">
        <h2 class="card__title">Acceso Restringido</h2>
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="passwordInput" class="form-label">Contrasena</label>
            <input
              type="password"
              id="passwordInput"
              class="form-input"
              placeholder="Ingrese la contrasena"
              required
              autocomplete="current-password"
            >
          </div>
          <div id="loginError" class="login-error" style="display:none;"></div>
          <button type="submit" class="btn btn--primary">Ingresar</button>
        </form>
      </div>

      <!-- Panel de visitas (oculto hasta autenticarse) -->
      <div id="dashboard" style="display:none;">

        <!-- Filtros -->
        <section class="card">
          <h2 class="card__title">Filtros de Busqueda</h2>
          <form id="filterForm" class="filter-form">
            <div class="filter-row">
              <div class="form-group">
                <label for="filterFrom" class="form-label">Desde</label>
                <input type="date" id="filterFrom" class="form-input">
              </div>
              <div class="form-group">
                <label for="filterTo" class="form-label">Hasta</label>
                <input type="date" id="filterTo" class="form-input">
              </div>
              <div class="form-group">
                <label for="filterIP" class="form-label">IP</label>
                <input
                  type="text"
                  id="filterIP"
                  class="form-input"
                  placeholder="Ej: 192.168.1.1"
                >
              </div>
              <div class="form-group form-group--actions">
                <button type="submit" class="btn btn--primary">Buscar</button>
                <button type="button" id="clearFilters" class="btn btn--secondary">Limpiar</button>
              </div>
            </div>
          </form>
        </section>

        <!-- Contador de visitas -->
        <div class="stats-bar" id="statsBar">
          <span id="totalCount">Total: 0 visitas</span>
        </div>

        <!-- Tabla de visitas -->
        <section class="card table-card">
          <div class="table-wrapper">
            <table class="visits-table" id="visitsTable">
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>IP</th>
                  <th>Ubicacion</th>
                  <th>Dispositivo</th>
                  <th>Navegador</th>
                  <th>SO</th>
                  <th>Detalles</th>
                </tr>
              </thead>
              <tbody id="visitsBody">
                <tr>
                  <td colspan="7" class="table-empty">Cargando visitas...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Paginacion -->
          <div class="pagination" id="pagination">
            <button id="prevPage" class="btn btn--small" disabled>Anterior</button>
            <span id="pageInfo" class="page-info">Pagina 1</span>
            <button id="nextPage" class="btn btn--small" disabled>Siguiente</button>
          </div>
        </section>

        <!-- Boton de logout -->
        <div class="logout-section">
          <button id="logoutBtn" class="btn btn--danger">Cerrar Sesion</button>
          <a href="/" class="btn btn--secondary">Volver al Inicio</a>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal de detalles de visita -->
  <div id="visitModal" class="modal" style="display:none;">
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">Detalle de Visita</h2>
        <button class="modal__close" id="modalClose">&times;</button>
      </div>
      <div class="modal__body" id="modalBody">
        <!-- Se llena dinamicamente -->
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
